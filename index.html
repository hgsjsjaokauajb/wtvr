<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Website</title>
    <style>
    <img src="foto.jpeg>
        body{
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
        }
        main {
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #ddd;
        }
        button {
            padding: 10px 20px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<main>
    <p>This is a simple HTML website example.</p>
    <button onclick="showMessage()">Click Me</button>
</main>

<footer>
    <p>© 2026 Simple Website</p>
</footer>

<script>
    function showMessage() {
        alert("Hello! You clicked the button 😊");
    }
</script>

</body>
</html>
